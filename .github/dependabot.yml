version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    allow:
      - dependency-type: "all"
    open-pull-requests-limit: 10

  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
    allow:
      - dependency-type: "all"
    open-pull-requests-limit: 10
